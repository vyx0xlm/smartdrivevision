<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set new password | SmartDrive</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1419; --bg-card: #1a2332; --accent: #00d4aa; --text: #e7e9ea;
            --text-muted: #8b98a5; --border: #2f3336;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; }
        h1 { font-size: 1.35rem; margin-bottom: 0.25rem; }
        .sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.25rem; line-height: 1.5; }
        label { display: block; margin-top: 1rem; margin-bottom: 0.35rem; font-size: 0.88rem; color: var(--text-muted); }
        input { width: 100%; padding: 0.65rem 0.85rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text); font-size: 1rem; }
        input:focus { outline: none; border-color: var(--accent); }
        .btn { display: block; width: 100%; margin-top: 1.25rem; padding: 0.7rem; border: none; border-radius: 8px; background: var(--accent); color: var(--bg-dark); font-weight: 600; cursor: pointer; font-family: inherit; }
        .links { margin-top: 1.25rem; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .links a { color: var(--accent); text-decoration: none; }
        .flash { padding: 0.65rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.88rem; }
        .flash.error { background: rgba(244, 33, 46, 0.12); border: 1px solid rgba(244, 33, 46, 0.35); color: #ff8a8c; }
        .flash.success { background: rgba(0, 186, 124, 0.15); color: #00ba7c; border: 1px solid rgba(0, 186, 124, 0.35); }
        .logo { text-align: center; margin-bottom: 1.5rem; font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>
    <div class="logo"><a href="{{ url_for('login') }}" style="color: inherit; text-decoration: none;">SmartDrive</a></div>
    <div class="card">
        <h1>Set a new password</h1>
        <p class="sub">Choose a new password for your SmartDrive account.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endwith %}
        <form method="post">
            <label for="password">New password</label>
            <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
            <label for="password_confirm">Confirm new password</label>
            <input type="password" id="password_confirm" name="password_confirm" required minlength="8" autocomplete="new-password">
            <button type="submit" class="btn">Update password</button>
        </form>
        <div class="links">
            <a href="{{ url_for('login') }}">← Back to sign in</a>
        </div>
    </div>
</body>
</html>
